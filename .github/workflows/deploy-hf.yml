name: 部署到 Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: 创建 HF Space（如果不存在）
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://huggingface.co/api/spaces/zhangguoguo1314/9router")
          if [ "$STATUS" = "200" ]; then
            echo "Space already exists"
          else
            echo "Creating space..."
            curl -s -X POST "https://huggingface.co/api/spaces" \
              -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"name":"9router","sdk":"docker","private":false}'
            sleep 5
          fi

      - name: 克隆 HF Space 仓库
        run: git clone https://x:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/zhangguoguo1314/9router hf-space

      - name: 复制文件到 HF Space
        run: |
          cp Dockerfile.hf hf-space/Dockerfile
          cp package.json hf-space/
          cp next.config.mjs hf-space/
          cp jsconfig.json hf-space/
          cp custom-server.js hf-space/
          cp postcss.config.mjs hf-space/
          cp -r public hf-space/
          cp -r open-sse hf-space/
          cp -r src hf-space/
          cp -r cli hf-space/
          cp -r scripts hf-space/
          cp -r skills hf-space/
          cd hf-space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || git commit -m "deploy from github actions $(date +%Y-%m-%d)"

      - name: 推送到 Hugging Face
        run: |
          cd hf-space
          git push https://x:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/zhangguoguo1314/9router main
