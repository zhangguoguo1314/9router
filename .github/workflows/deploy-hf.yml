name: 部署到 Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: 创建 HF Space（如果不存在）
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Token prefix: ${HF_TOKEN:0:7}..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" "https://huggingface.co/api/spaces/youqisi/9router")
          echo "Check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Space already exists"
          else
            echo "Creating space via /api/repos/create ..."
            RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://huggingface.co/api/repos/create" \
              -H "Authorization: Bearer $HF_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"type":"space","name":"9router","sdk":"docker","private":false}')
            echo "Create response: $RESP"
            sleep 10
          fi

      - name: 克隆 HF Space 仓库
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: cloning HF space..."
            git clone "https://x:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/youqisi/9router" hf-space && break
            echo "Clone failed, retrying in 5s..."
            sleep 5
          done
          if [ ! -d "hf-space/.git" ]; then
            echo "ERROR: Failed to clone HF space after 3 attempts"
            exit 1
          fi

      - name: 复制文件到 HF Space
        run: |
          echo "=== Current package.json version ==="
          grep '"version"' package.json
          echo "=== HF Space package.json version (before) ==="
          grep '"version"' hf-space/package.json || echo "No package.json in HF Space"
          
          cp Dockerfile.hf hf-space/Dockerfile
          cp package.json hf-space/
          cp next.config.mjs hf-space/
          cp jsconfig.json hf-space/
          cp custom-server.js hf-space/
          cp postcss.config.mjs hf-space/
          cp -r public hf-space/
          cp -r open-sse hf-space/
          cp -r src hf-space/
          cp -r cli hf-space/
          cp -r scripts hf-space/
          cp -r skills hf-space/
          
          echo "=== HF Space package.json version (after) ==="
          grep '"version"' hf-space/package.json
          
          cd hf-space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          
          # 检查是否有变化
          if git diff --cached --quiet; then
            echo "No changes detected. Creating empty commit to trigger rebuild."
            git commit --allow-empty -m "deploy: force rebuild $(date +%Y-%m-%d_%H:%M:%S) [skip ci]"
          else
            echo "Changes detected:"
            git diff --cached --stat
            git commit -m "deploy from github actions $(date +%Y-%m-%d_%H:%M:%S)"
          fi

      - name: 推送到 Hugging Face
        run: |
          cd hf-space
          echo "=== Last 3 commits ==="
          git log --oneline -3
          for i in 1 2 3; do
            echo "Attempt $i: pushing to HF..."
            git push --force "https://x:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/youqisi/9router" main && break
            echo "Push failed, retrying in 5s..."
            sleep 5
          done
